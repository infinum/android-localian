buildscript {

    apply from: "config.gradle"
    apply from: "maven.gradle"

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
    dependencies {
        classpath libs.tools.gradle
        classpath libs.kotlin.gradle
        classpath libs.cpd
        classpath libs.detekt.gradle
        classpath libs.dokka
    }
}

allprojects {
    repositories {
        google()
        mavenLocal()
        mavenCentral()
    }
}

subprojects {
    apply from: "$rootDir/cpd.gradle"
    apply from: "$rootDir/detekt.gradle"
    apply from: "$rootDir/dokka.gradle"

    configurations.configureEach {
        resolutionStrategy.eachDependency {
            if (requested.group == "io.netty" && requested.name == "netty-handler") {
                useVersion(libs.versions.netty.get())
            }
            if (requested.group == "com.google.protobuf" && requested.name == "protobuf-kotlin") {
                useVersion(libs.versions.protobuf.kotlin.get())
            }
            if (requested.group == "org.jdom" && requested.name == "jdom2") {
                useVersion(libs.versions.jdom2.get())
            }
        }
    }
}

apply from: "deploy.gradle"

tasks.withType(JavaCompile) {
    options.compilerArgs += ["--release", "8"]
}

task clean(type: Delete) {
    delete rootProject.buildDir
}

task lintAll(dependsOn: [
        ':localian:lintRelease'
]) {
    group = "Verification"
    description = "Run Lint on all modules"
}

task detektAll(dependsOn: [
    ':localian:detekt'
]) {
    group = "Verification"
    description = "Run Detekt on all modules"
}

task cpdAll(dependsOn: [
        ':localian:cpdCheck'
]) {
    group = "Verification"
    description = "Run CPD on all modules"
}

task runStaticChecks(dependsOn: [
        ':lintAll',
        ':detektAll',
        ':cpdAll'
]) {
    group = "Verification"
    description = "Run static checks on all modules"
}